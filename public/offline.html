<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Krisha Sparkles</title>
  <link rel="icon" href="/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 2.5rem; font-weight: 700; color: #c9a84c; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .logo span { color: #888; font-size: 1rem; display: block; font-weight: 400; margin-top: 4px; }
    .icon { font-size: 4rem; margin: 2rem 0 1rem; opacity: 0.4; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #f5f5f5; }
    p { color: #888; font-size: 0.95rem; line-height: 1.6; max-width: 380px; }
    .actions { display: flex; gap: 0.75rem; margin-top: 2rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-gold { background: linear-gradient(135deg, #c9a84c, #e8c96a); color: #0a0a0a; border: none; }
    .btn-outline { background: transparent; color: #c9a84c; border: 1px solid rgba(201,168,76,0.4); }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="logo">✦ Krisha Sparkles<span>Exquisite Imitation Jewelry</span></div>
  <div class="icon">📶</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your connection. Check your internet and try again — we'll be here when you're back! ✨</p>
  <div class="actions">
    <button class="btn btn-gold" onclick="window.location.reload()">Try Again</button>
    <a href="/shop" class="btn btn-outline">Browse Shop</a>
  </div>
</body>
</html>

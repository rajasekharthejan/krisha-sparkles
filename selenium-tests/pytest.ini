[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=reports/test_report.html
    --self-contained-html
    --tb=short
    -v
    --reruns=2
    --reruns-delay=2
markers =
    store: Store / customer-facing page tests
    admin: Admin panel page tests
    auth: Authentication flow tests
    account: Account section tests (requires login)
    smoke: Quick sanity check tests
    slow: Tests that take longer to run
log_cli = true
log_cli_level = INFO

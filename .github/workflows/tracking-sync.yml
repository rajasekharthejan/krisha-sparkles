name: Tracking Sync

on:
  schedule:
    # Every 5 minutes — syncs shipped orders → delivered via Shippo tracking API
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI for testing

jobs:
  sync:
    name: Sync Tracking Status
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Call tracking-sync endpoint
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "https://shopkrisha.com/api/cron/tracking-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: Expected 200 but got $RESPONSE"
            exit 1
          fi
